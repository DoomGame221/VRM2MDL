name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ libgtk-3-dev build-essential libassimp-dev cmake fuse libfuse2 wget

    - name: Install Assimp via vcpkg (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        vcpkg install assimp:x64-windows

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build C++ Cores (CMake)
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
        else
          cmake -B build -DCMAKE_BUILD_TYPE=Release
        fi
        cmake --build build --config Release
      shell: bash

    - name: Build Rust GUI
      working-directory: ./vrm_gui
      run: cargo build --release

    - name: Build AppImage (Linux)
      if: matrix.os == 'ubuntu-22.04'
      run: bash build_appimage.sh

    - name: Package Release (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        mkdir -p VRM2MDL-Windows/cores
        cp build/bin/Release/vrm_core.dll VRM2MDL-Windows/cores/
        cp build/bin/Release/assimp_core.dll VRM2MDL-Windows/cores/ || true
        cp vrm_gui/target/release/vrm_gui.exe VRM2MDL-Windows/
        cp README.md VRM2MDL-Windows/
        7z a VRM2MDL-Windows.zip VRM2MDL-Windows

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          VRM2MDL-x86_64.AppImage
          VRM2MDL-Windows.zip
        generate_release_notes: true
