name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ libgtk-3-dev build-essential libassimp-dev cmake

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build C++ Cores (CMake)
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Build Rust GUI
      working-directory: ./vrm_gui
      run: cargo build --release

    - name: Package Linux Output
      run: |
        mkdir -p vrm2mdl-linux/cores
        cp build/bin/libvrm_core.so vrm2mdl-linux/cores/
        cp build/bin/libassimp_core.so vrm2mdl-linux/cores/ || true
        cp vrm_gui/target/release/vrm_gui vrm2mdl-linux/
        cp README.md vrm2mdl-linux/

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vrm2mdl-linux
        path: vrm2mdl-linux/

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Install Assimp via vcpkg
      run: |
        vcpkg install assimp:x64-windows

    - name: Build C++ Cores (CMake)
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/runway/vcpkg/scripts/buildsystems/vcpkg.cmake
        cmake --build build --config Release

    - name: Build Rust GUI
      working-directory: ./vrm_gui
      run: cargo build --release

    - name: Package Windows Output
      shell: bash
      run: |
        mkdir -p vrm2mdl-windows/cores
        cp build/bin/Release/vrm_core.dll vrm2mdl-windows/cores/
        cp build/bin/Release/assimp_core.dll vrm2mdl-windows/cores/ || true
        cp vrm_gui/target/release/vrm_gui.exe vrm2mdl-windows/
        cp README.md vrm2mdl-windows/

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vrm2mdl-windows
        path: vrm2mdl-windows/
